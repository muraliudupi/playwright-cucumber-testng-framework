# 1. Instruct the plugin to group results inside a dynamically generated timestamp folder
basefolder.name=./test-output/reports/extent/Execution_
basefolder.datetimepattern=dd-MM-yyyy_HH-mm-ss

# 2. Enable the Spark html report engine layout
extent.reporter.spark.start=true

# 3. The file will be placed INSIDE the timestamped directory.
extent.reporter.spark.out=ExtentReport.html

# 4. Embed snapshots cleanly into the report as Base64 markup elements
extent.reporter.spark.base64imagesrc=true