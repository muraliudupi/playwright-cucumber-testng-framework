name: Playwright Enterprise Automation CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tags to run'
        required: false
        default: '@sanity' # Defaults to sanity, but allows you to type @regression manually

permissions:
  contents: read

jobs:
  automation-execution:
    name: Parallel Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Baseline
        uses: actions/checkout@v4

      - name: Setup Java Development Kit Environment (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Validate Gradle Wrapper Execution Permissions
        run: chmod +x gradlew

      - name: Cache Playwright Browser Binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright OS Linux Dependencies
        run: npx playwright install-deps

      - name: Execute Test Suite via Parallel Worker Threads (Linux Headless Safe)
        continue-on-error: true
        id: test_execution
        run: |
          TAGS="${{ github.event.inputs.tags || '@sanity' }}"
          xvfb-run ./gradlew clean test "-Dcucumber.filter.tags=$TAGS" --no-daemon --info

      - name: Publish Interactive Extent Automation Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Automation-Report
          path: build/reports/extent/ExtentReport.html
          retention-days: 14
          if-no-files-found: warn

      - name: Parse TestNG XML Report Results
        if: always()
        id: report_parser
        run: |
          XML_PATH=$(find build/test-results/test -name "*.xml" -print -quit)
          
          if [ -n "$XML_PATH" ] && [ -f "$XML_PATH" ]; then
            echo "Found TestNG XML report at: $XML_PATH"
          
            TOTAL_SCENARIOS=$(grep -oE "tests=\"[0-9]+\"" "$XML_PATH" | grep -oE "[0-9]+")
            FAILED_SCENARIOS=$(grep -oE "failures=\"[0-9]+\"" "$XML_PATH" | grep -oE "[0-9]+")
            SKIPPED_SCENARIOS=$(grep -oE "skipped=\"[0-9]+\"" "$XML_PATH" | grep -oE "[0-9]+")
          
            TOTAL_SCENARIOS=${TOTAL_SCENARIOS:-0}
            FAILED_SCENARIOS=${FAILED_SCENARIOS:-0}
            SKIPPED_SCENARIOS=${SKIPPED_SCENARIOS:-0}
          
            PASSED_SCENARIOS=$((TOTAL_SCENARIOS - FAILED_SCENARIOS - SKIPPED_SCENARIOS))
          
            if [ "$FAILED_SCENARIOS" -gt 0 ]; then
              STATUS_TEXT="❌ FAILED ($FAILED_SCENARIOS Scenarios Failed)"
              BUILD_STATUS="FAILED"
            else
              STATUS_TEXT="✅ PASSED (All Scenarios Clean)"
              BUILD_STATUS="SUCCESS"
            fi
          else
            echo "❌ CRITICAL: TestNG XML report could not be found."
            TOTAL_SCENARIOS=0
            FAILED_SCENARIOS=0
            PASSED_SCENARIOS=0
            STATUS_TEXT="⚠️ ERROR (No Report Found)"
            BUILD_STATUS="FAILED"
          fi
          
          echo "TOTAL_COUNT=$TOTAL_SCENARIOS" >> $GITHUB_ENV
          echo "PASSED_COUNT=$PASSED_SCENARIOS" >> $GITHUB_ENV
          echo "FAILED_COUNT=$FAILED_SCENARIOS" >> $GITHUB_ENV
          echo "EMAIL_STATUS=$STATUS_TEXT" >> $GITHUB_ENV
          echo "BUILD_STATUS=$BUILD_STATUS" >> $GITHUB_ENV

      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          subject: "Automation Results: ${{ env.EMAIL_STATUS }} | ${{ github.repository }} (Build #${{ github.run_number }})"
          to: qamurali@outlook.com
          from: Automation Framework <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hi Team,
            
            The automation test execution has completed.
            
            =========================================
            📊 EXECUTION SUMMARY
            =========================================
            • Status:            ${{ env.EMAIL_STATUS }}
            • Total Scenarios:   ${{ env.TOTAL_COUNT }}
            • Passed Scenarios:  ${{ env.PASSED_COUNT }}
            • Failed Scenarios:  ${{ env.FAILED_COUNT }}
            =========================================
            
            - Repository:   ${{ github.repository }}
            - Branch:       ${{ github.ref_name }}
            - Triggered By: ${{ github.actor }}
            - Action Link:  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Please find the interactive Extent Report attached to this email for full stack traces.
            
            Regards,
            QA Automation Bot
          attachments: build/reports/extent/ExtentReport.html

      - name: Enforce Correct Pipeline Status Badge
        if: always()
        run: |
          if [ "${{ env.BUILD_STATUS }}" = "FAILED" ]; then
            echo "Automation tests failed. Marking GitHub build as failed."
            exit 1
          fi