name: Playwright Enterprise Automation CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

permissions:
  contents: read

jobs:
  automation-execution:
    name: Parallel Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Baseline
        uses: actions/checkout@v4

      - name: Setup Java Development Kit Environment (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle' # Automatically caches gradle wrappers to speed up subsequent runs

      - name: Validate Gradle Wrapper Execution Permissions
        run: chmod +x gradlew

      - name: Install Playwright Core System Dependencies & Browser Binaries
        # This downloads the required isolated browser engines directly into the runner instance
        run: ./gradlew testCodeClasses && ./gradlew run --args="install --with-deps"

      - name: Execute Test Suite via Parallel Worker Threads
        # Triggers TestNGRunner running parallel workers safely in headless mode inside the container
        run: ./gradlew test --no-daemon

      - name: Publish Interactive Extent Automation Reports
        if: always() # Guarantees execution reports are saved even if a test scenario fails
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Regression-Report-Artifact
          path: build/reports/extent/
          retention-days: 14 # Keeps the storage footprint tidy by auto-purging old builds