name: Playwright Enterprise Automation CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  automation-execution:
    name: Parallel Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Baseline
        uses: actions/checkout@v6

      - name: Setup Java Development Kit Environment (JDK 21)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Validate Gradle Wrapper Execution Permissions
        run: chmod +x gradlew

      - name: Install Playwright Core System Dependencies & Linux Drivers
        # Standardizes library setup using npm/npx tools already native to the runner environment
        run: |
          npm install -g playwright
          npx playwright install-deps

      - name: Execute Test Suite via Parallel Worker Threads (Linux Headless Safe)
        # Note: Playwright Java automatically downloads missing browser binaries
        # (Chromium/Firefox) the first time the DriverFactory calls Playwright.create()
        run: xvfb-run ./gradlew test --no-daemon

      - name: DEBUG - List workspace contents after test run
        # Temporary diagnostic step. Prints exactly what got written where,
        # so we can tell whether build/ is truly empty (0 scenarios
        # ran, or the Extent/Cucumber plugins never fired) versus files
        # landing in an unexpected directory. Remove once root-caused.
        if: always()
        run: |
          echo "--- Repo root contents ---"
          ls -la
          echo "--- Searching for any build or build/reports dirs anywhere ---"
          find . -type d \( -name "build" -o -name "reports" \) -not -path "*/node_modules/*" 2>/dev/null
          echo "--- Full recursive listing of build if it exists ---"
          find build -type f 2>/dev/null || echo "build/ does not exist at repo root"
          echo "--- Full recursive listing of build/ if it exists ---"
          find build -type f 2>/dev/null | head -50 || echo "build/ does not exist"

      - name: Publish Interactive Extent Automation Reports
        if: always()
        uses: actions/upload-artifact@v4 # Note: Ensure v7 actually exists/is supported; v4 is standard as of recently.
        with:
          name: Extent-Regression-Report-Artifact
          path: build/reports/extent/**/ExtentReport.html  # Uses wildcards to find it recursively
          retention-days: 14
          if-no-files-found: warn