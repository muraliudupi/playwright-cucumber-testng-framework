name: Playwright Enterprise Automation CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  automation-execution:
    name: Parallel Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Baseline
        uses: actions/checkout@v4

      - name: Setup Java Development Kit Environment (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Validate Gradle Wrapper Execution Permissions
        run: chmod +x gradlew

      - name: Install Playwright Core System Dependencies & Browser Binaries
        run: ./gradlew testCodeClasses && ./gradlew run --args="install --with-deps"

      - name: Execute Test Suite via Parallel Worker Threads (Linux Headless Safe)
        # xvfb-run provides a virtual display server to prevent initialization crashes on Linux
        run: xvfb-run ./gradlew test --no-daemon

      - name: Publish Interactive Extent Automation Reports
        if: always() # Ensures logs are uploaded even if tests crash or fail
        uses: actions/upload-artifact@v4
        with:
          name: Extent-Regression-Report-Artifact
          # FIX: Uses a wildcard pattern '**' so GitHub can find files inside our dynamic timestamped folders
          path: build/reports/extent/**
          retention-days: 14