name: Playwright Enterprise Automation CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  automation-execution:
    name: Parallel Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Baseline
        uses: actions/checkout@v6

      - name: Setup Java Development Kit Environment (JDK 21)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Validate Gradle Wrapper Execution Permissions
        run: chmod +x gradlew

      - name: Cache Playwright Browser Binaries
        # Speeds up subsequent runs by caching the browser binaries downloaded by Playwright Java
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright OS Dependencies
        # Installs native Linux system libraries needed to launch headlessly in the runner
        run: |
          npm install -g playwright@1.60.0
          npx playwright install-deps

      - name: Execute Test Suite via Parallel Worker Threads (Linux Headless Safe)
        # Added '--info' to force Gradle to output full class-scanning and test suite selection diagnostics
        run: xvfb-run ./gradlew test --no-daemon --info

      - name: DEBUG - List workspace contents after test run
        if: always()
        run: |
          echo "--- Repo root contents ---"
          ls -la
          echo "--- Searching for any build or build/reports dirs anywhere ---"
          find . -type d \( -name "build" -o -name "reports" \) -not -path "*/node_modules/*" 2>/dev/null
          echo "--- Full recursive listing of build if it exists ---"
          find build -type f 2>/dev/null || echo "build/ does not exist at repo root"
          echo "--- Full recursive listing of build/ if it exists ---"
          find build -type f 2>/dev/null | head -50 || echo "build/ does not exist"

      - name: Publish Interactive Extent Automation Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Extent-Regression-Report-Artifact
          path: build/reports/extent/ExtentReport.html
          retention-days: 14
          if-no-files-found: warn