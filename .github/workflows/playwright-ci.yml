name: Playwright Enterprise Automation CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  automation-execution:
    name: Parallel Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code Baseline
        uses: actions/checkout@v6

      - name: Setup Java Development Kit Environment (JDK 21)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Validate Gradle Wrapper Execution Permissions
        run: chmod +x gradlew

      - name: Cache Playwright Browser Binaries
        # Speeds up subsequent runs by caching the browser binaries downloaded by Playwright Java
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright OS Dependencies
        # Installs native Linux system libraries needed to launch headlessly in the runner
        run: |
          npm install -g playwright@1.60.0
          npx playwright install-deps

      - name: Execute Test Suite via Parallel Worker Threads (Linux Headless Safe)
        continue-on-error: true
        run: xvfb-run ./gradlew clean test '-Dcucumber.filter.tags=@sanity' --no-daemon --info


      - name: Publish Interactive Extent Automation Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Extent-Regression-Report-Artifact
          path: build/reports/extent/ExtentReport.html
          retention-days: 14
          if-no-files-found: warn

      - name: Send Email Report
        # This step runs whether the tests passed, failed, or timed out
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          # Configuration for your SMTP server
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}

          # Email content details
          subject: "Automation Test Run Results: ${{ github.repository }} (Build #${{ github.run_number }})"
          to: qamurali@outlook.com
          from: Automation Framework <${{ secrets.MAIL_USERNAME }}>
          body: |
            Hi Team,
            The automation test execution has completed. 
          
            - Repository: ${{ github.repository }}
            - Branch: ${{ github.ref_name }}
            - Triggered By: ${{ github.actor }}
            - Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
            Please find the Extent Report attached to this email.
          
            Regards,
            QA Automation Bot

          # Path to your Extent Report HTML file
          attachments: build/reports/extent/ExtentReport.html