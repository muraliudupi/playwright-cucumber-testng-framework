baseUrl=https://parabank.parasoft.com/
# webkit, firefox, chromium
browser=chromium
headless=true
# Captured for all Pass & Fail scenario. (set false to capture on only failure)
screenshot.on.pass=true
excel.path=src/test/resources/testdata/EnterpriseTestData.xlsx

# --- Web Framework Tuning ---
web.viewport.width=1280
web.viewport.height=720
web.element.wait.timeout.ms=5000
web.dropdown.wait.timeout.ms=3000
web.confirmation.wait.timeout.ms=10000

# DB Set-up
db.url=jdbc:postgresql://your-enterprise-db:5432/bank_db
db.user=qa_automation_user
db.validation.enabled=false

# --- Database Pool Tuning ---
db.pool.max.size=15
db.pool.min.idle=5
db.pool.idle.timeout.ms=300000
db.pool.connection.timeout.ms=20000

# --- Database Retry Policy (used by getSingleValueWithRetry) ---
db.retry.max.timeout.sec=5
db.retry.poll.interval.ms=500

# Set this to 'browserstack' when running in the CI/CD pipeline
mobile.execution.mode=local

# Required for local testing (Use absolute path to your APK)
local.app.path=src/test/resources/apps/mda-2.2.0-25.apk
mobile.default.username=bod@example.com
mobile.default.password=10203040
mobile.existence.check.timeout.sec=3

# --- Mobile Framework Tuning ---
mobile.local.device.name=emulator-5554
mobile.local.app.wait.activity=*
mobile.local.new.command.timeout.sec=60
mobile.field.decorator.timeout.sec=5
mobile.element.wait.timeout.sec=15
mobile.element.short.wait.timeout.sec=10

# ==============================================================================
# BrowserStack Mobile Device Automation Cloud Matrix
# ==============================================================================
bs.hub.url=https://hub-cloud.browserstack.com/wd/hub
bs.username=your_browserstack_username_placeholder
bs.access.key=your_browserstack_access_key_placeholder
bs.project.name=ParaBank Mobile Ecosystem
bs.build.name=Build_Alpha_2026.07
bs.local=false

# --- Android Execution Target Profile ---
android.platform.version=14.0
android.device.name=Google Pixel 8
android.automation.name=UiAutomator2
android.app.id=bs://your_android_app_id_uploaded_hash

# --- iOS Execution Target Profile ---
ios.platform.version=17.0
ios.device.name=iPhone 15 Pro
ios.automation.name=XCUITest
ios.app.id=bs://your_ios_app_id_uploaded_hash
